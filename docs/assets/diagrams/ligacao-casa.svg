<svg width="1100" height="360" viewBox="0 0 1100 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .label { font: 700 18px Arial, sans-serif; fill: #111827; }
      .small { font: 400 15px Arial, sans-serif; fill: #374151; }
      .wire { stroke: #111827; stroke-width: 5; fill: none; stroke-linecap: round; }
      .box { fill: #f9fafb; stroke: #111827; stroke-width: 2; rx: 14; }
      .green { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 14; }
      .blue { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 14; }
      .orange { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 14; }
    </style>
  </defs>

  <text x="550" y="45" text-anchor="middle" class="title">Ligação conceitual de uma casa</text>

  <rect x="60" y="120" width="160" height="80" class="blue"/>
  <text x="140" y="152" text-anchor="middle" class="label">COLUNA</text>
  <text x="140" y="178" text-anchor="middle" class="small">GPIO ativo</text>

  <line x1="220" y1="160" x2="340" y2="160" class="wire"/>

  <rect x="340" y="100" width="210" height="120" class="green"/>
  <text x="445" y="138" text-anchor="middle" class="label">Reed switch</text>
  <text x="445" y="166" text-anchor="middle" class="small">fecha com o ímã</text>
  <text x="445" y="192" text-anchor="middle" class="small">da peça</text>

  <line x1="550" y1="160" x2="660" y2="160" class="wire"/>

  <rect x="660" y="100" width="210" height="120" class="orange"/>
  <text x="765" y="138" text-anchor="middle" class="label">Diodo</text>
  <text x="765" y="166" text-anchor="middle" class="small">anodo na coluna</text>
  <text x="765" y="192" text-anchor="middle" class="small">catodo/faixa na linha</text>

  <line x1="870" y1="160" x2="950" y2="160" class="wire"/>

  <rect x="950" y="120" width="110" height="80" class="blue"/>
  <text x="1005" y="152" text-anchor="middle" class="label">LINHA</text>
  <text x="1005" y="178" text-anchor="middle" class="small">GPIO lido</text>

  <text x="550" y="285" text-anchor="middle" class="small">COLUNA ---- reed switch ---- anodo do diodo |>| catodo/faixa ---- LINHA</text>
</svg>
